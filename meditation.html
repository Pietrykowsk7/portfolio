<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Meditation Room — Wojciech Pietryka</title>
<style>
*{ margin:0; padding:0; box-sizing:border-box; }
html,body{ width:100%; height:100%; overflow:hidden; background:#000; }
canvas{ display:block; width:100%; height:100%; }
#ui{
  position:fixed; inset:0; pointer-events:none; z-index:2;
  display:flex; align-items:flex-end; justify-content:space-between;
  padding:2rem 2.5rem;
}
#back{
  font-family:Arial,sans-serif; font-size:0.62rem; letter-spacing:0.2em;
  text-transform:uppercase; color:rgba(255,255,255,0.3);
  text-decoration:none; pointer-events:auto; transition:color 0.3s;
}
#back:hover{ color:rgba(255,255,255,0.85); }
#label{
  font-family:Arial,sans-serif; font-size:0.62rem; letter-spacing:0.2em;
  text-transform:uppercase; color:rgba(255,255,255,0.12);
}
#hint{
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  font-family:Arial,sans-serif; font-size:0.62rem; letter-spacing:0.28em;
  text-transform:uppercase; color:rgba(255,255,255,0.18);
  pointer-events:none; transition:opacity 2s ease;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <a href="index.html" id="back">← Portfolio</a>
  <div id="label">Meditation Room</div>
</div>
<div id="hint">Touch</div>
<script>
(function(){
  /* ─────────────────────────────────────────────
     Approach: CPU wave simulation on small grid,
     upload as texture each frame → GPU metallic render.
     Avoids all float-texture render-target issues.
  ───────────────────────────────────────────────*/
  var canvas = document.getElementById('c');
  var hint   = document.getElementById('hint');

  /* Try WebGL, fall back to Canvas2D */
  var gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if(!gl){
    document.body.innerHTML='<p style="color:#fff;padding:2rem">WebGL not supported</p>';
    return;
  }

  /* ── Wave grid (CPU) ── */
  var GW = 180, GH = 180;
  var cur  = new Float32Array(GW*GH);
  var prev = new Float32Array(GW*GH);
  var next = new Float32Array(GW*GH);
  /* pack to RGBA8 for upload */
  var texData = new Uint8Array(GW*GH*4);

  function idx(x,y){ return y*GW + x; }

  function simStep(mx, my, force){
    var c2 = 0.24, damp = 0.993;
    /* mouse grid position */
    var gx = mx * GW, gy = my * GH;
    for(var y=1;y<GH-1;y++){
      for(var x=1;x<GW-1;x++){
        var i = idx(x,y);
        var lap = cur[idx(x+1,y)] + cur[idx(x-1,y)]
                + cur[idx(x,y+1)] + cur[idx(x,y-1)]
                - 4*cur[i];
        next[i] = (cur[i]*2 - prev[i] + c2*lap) * damp;
        /* mouse stamp */
        var dx = x-gx, dy = y-gy;
        var dd = dx*dx+dy*dy;
        next[i] += Math.exp(-dd*0.25) * force * 0.28;
      }
    }
    /* swap */
    var tmp=prev; prev=cur; cur=next; next=tmp;
  }

  function packTex(){
    for(var i=0;i<GW*GH;i++){
      /* encode height [-1..1] into R channel as 0..255 */
      var v = Math.max(-1, Math.min(1, cur[i]));
      var enc = Math.round((v+1)*0.5*255);
      texData[i*4+0] = enc;
      texData[i*4+1] = enc;
      texData[i*4+2] = enc;
      texData[i*4+3] = 255;
    }
  }

  /* ── WebGL shaders ── */
  var VS = [
    'attribute vec2 p;',
    'varying vec2 vUv;',
    'void main(){ vUv=p*.5+.5; gl_Position=vec4(p,0,1); }'
  ].join('\n');

  var FS = [
    'precision highp float;',
    'uniform sampler2D uSim;',
    'uniform vec2  uRes;',
    'uniform float uTime;',
    'varying vec2  vUv;',

    /* sample height from R channel, remap 0..1 → -1..1 */
    'float h(vec2 uv){ return (texture2D(uSim,uv).r - 0.5)*2.; }',

    /* environment map — chrome studio */
    'vec3 envMap(vec3 d){',
    '  vec3 dark   = vec3(0.005,0.005,0.008);',
    '  vec3 light  = vec3(0.92,0.94,1.0);',
    '  vec3 warm   = vec3(0.85,0.82,0.72);',
    /* top key light */
    '  float top  = smoothstep(.45,.55,d.y)*smoothstep(.95,.65,d.y);',
    /* side strips */
    '  float sR   = smoothstep(.72,.74,d.x)*smoothstep(.98,.82,d.x)*(1.-abs(d.y)*.6);',
    '  float sL   = smoothstep(.72,.74,-d.x)*smoothstep(.98,.82,-d.x)*(1.-abs(d.y)*.6);',
    /* floor warm bounce */
    '  float bot  = smoothstep(-.3,-.8,d.y)*0.4;',
    '  vec3 col = mix(dark, dark*3., smoothstep(-1.,0.,d.y));',
    '  col = mix(col, light, top);',
    '  col += light*.5*sR + light*.4*sL + warm*.2*bot;',
    '  return col;',
    '}',

    'void main(){',
    '  vec2 asp   = vec2(uRes.x/uRes.y, 1.0);',
    '  vec2 puv   = vUv;',

    /* circular mask — ellipse covering viewport */
    '  vec2 dc    = (vUv - .5) * asp * 2.0;',
    '  float mask = 1.-smoothstep(0.78,0.92,length(dc*vec2(1.,1.3)));',
    '  if(mask < 0.01){ gl_FragColor=vec4(0.); return; }',

    /* finite-diff normal from height field */
    '  float eps = 1.0/180.0;',
    '  float hC  = h(puv);',
    '  float hR  = h(puv+vec2(eps,0.));',
    '  float hL  = h(puv-vec2(eps,0.));',
    '  float hU  = h(puv+vec2(0.,eps));',
    '  float hD  = h(puv-vec2(0.,eps));',
    '  float scale = 0.6;',
    '  vec3 norm  = normalize(vec3(-(hR-hL)*scale, 1., -(hU-hD)*scale));',

    /* view ray from slightly above */
    '  vec3 rd    = normalize(vec3(dc.x*.4, -1., dc.y*.4));',

    /* reflection */
    '  vec3 refl  = reflect(rd, norm);',
    '  vec3 ecol  = envMap(normalize(refl));',

    /* fresnel */
    '  float fres = pow(1.-abs(dot(rd,norm)),4.);',
    '  float metal= .85 + fres*.15;',

    /* speculars */
    '  vec3 L1    = normalize(vec3(.3,1.,.1));',
    '  float sp1  = pow(max(dot(refl,L1),0.),320.)*4.0;',
    '  vec3 L2    = normalize(vec3(-.5,.5,-.4));',
    '  float sp2  = pow(max(dot(refl,L2),0.),90.)*1.0;',
    '  vec3 L3    = normalize(vec3(.1,.4,.9));',
    '  float sp3  = pow(max(dot(refl,L3),0.),140.)*0.7;',

    '  vec3 base  = vec3(0.02,0.02,0.025);',
    '  vec3 col   = mix(base, ecol, metal);',
    '  col += vec3(sp1) + vec3(sp2*.5,sp2*.5,sp2*.6) + vec3(sp3*.3,sp3*.35,sp3*.42);',

    /* ripple glow */
    '  float rg   = max(hC,0.)*2.5;',
    '  col += vec3(rg*.06,rg*.07,rg*.12);',

    /* edge fade */
    '  col *= mask;',

    /* tone map + gamma */
    '  col = col/(1.+col);',
    '  col = pow(max(col,vec3(0.)),vec3(1./2.2));',

    '  gl_FragColor = vec4(col,1.);',
    '}'
  ].join('\n');

  /* ── Compile + link ── */
  function sh(type,src){
    var s=gl.createShader(type);
    gl.shaderSource(s,src); gl.compileShader(s);
    if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){
      console.error(gl.getShaderInfoLog(s)); return null;
    }
    return s;
  }
  var program=gl.createProgram();
  gl.attachShader(program, sh(gl.VERTEX_SHADER,VS));
  gl.attachShader(program, sh(gl.FRAGMENT_SHADER,FS));
  gl.linkProgram(program);
  if(!gl.getProgramParameter(program,gl.LINK_STATUS)){
    console.error(gl.getProgramInfoLog(program)); return;
  }
  gl.useProgram(program);

  /* ── Quad ── */
  var buf=gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
  var aP=gl.getAttribLocation(program,'p');
  gl.enableVertexAttribArray(aP);
  gl.vertexAttribPointer(aP,2,gl.FLOAT,false,0,0);

  /* ── Texture ── */
  var tex=gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D,tex);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);

  var uSim  = gl.getUniformLocation(program,'uSim');
  var uRes  = gl.getUniformLocation(program,'uRes');
  var uTime = gl.getUniformLocation(program,'uTime');
  gl.uniform1i(uSim,0);

  /* ── Mouse ── */
  var mx=0.5, my=0.5, pmx=0.5, pmy=0.5;
  var force=0, targetForce=0;
  var hintGone=false;

  function onMove(cx,cy){
    pmx=mx; pmy=my;
    mx=cx/window.innerWidth;
    my=1-cy/window.innerHeight;
    var spd=Math.hypot(mx-pmx,my-pmy);
    targetForce=Math.min(spd*60,1);
    if(!hintGone){ hintGone=true; hint.style.opacity='0'; }
  }
  window.addEventListener('mousemove',function(e){ onMove(e.clientX,e.clientY); });
  window.addEventListener('touchmove',function(e){
    e.preventDefault(); onMove(e.touches[0].clientX,e.touches[0].clientY);
  },{passive:false});
  window.addEventListener('touchstart',function(e){
    onMove(e.touches[0].clientX,e.touches[0].clientY);
  },{passive:true});
  window.addEventListener('mouseleave',function(){ targetForce=0; });

  /* ── Resize ── */
  function resize(){
    var pr=Math.min(window.devicePixelRatio||1,2);
    canvas.width=window.innerWidth*pr;
    canvas.height=window.innerHeight*pr;
    gl.viewport(0,0,canvas.width,canvas.height);
  }
  resize();
  window.addEventListener('resize',resize);

  /* initial ripple */
  cur[idx(Math.floor(GW/2),Math.floor(GH/2))] = 0.6;
  cur[idx(Math.floor(GW/3),Math.floor(GH/3))] = 0.4;

  /* ── Loop ── */
  var t0=performance.now();
  function frame(){
    var t=(performance.now()-t0)/1000;

    /* smooth mouse */
    force+=(targetForce-force)*0.18;
    targetForce*=0.84;

    /* 2 sim steps per frame for stability */
    simStep(mx,my,force);
    simStep(mx,my,force*0.5);

    /* upload to GPU */
    packTex();
    gl.bindTexture(gl.TEXTURE_2D,tex);
    gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,GW,GH,0,gl.RGBA,gl.UNSIGNED_BYTE,texData);

    /* draw */
    gl.uniform2f(uRes,canvas.width,canvas.height);
    gl.uniform1f(uTime,t);
    gl.drawArrays(gl.TRIANGLE_STRIP,0,4);

    requestAnimationFrame(frame);
  }
  frame();
})();
</script>
</body>
</html>
