<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Meditation Room — Wojciech Pietryka</title>
<style>
*{ margin:0; padding:0; box-sizing:border-box; }
html,body{ width:100%; height:100%; overflow:hidden; background:#000; }
canvas{ display:block; width:100%; height:100%; }
#ui{
  position:fixed; inset:0; pointer-events:none; z-index:2;
  display:flex; align-items:flex-end; justify-content:space-between;
  padding:2rem 2.5rem;
}
#back{
  font-family:Arial,sans-serif; font-size:0.62rem; letter-spacing:0.2em;
  text-transform:uppercase; color:rgba(255,255,255,0.3);
  text-decoration:none; pointer-events:auto; transition:color 0.3s;
}
#back:hover{ color:rgba(255,255,255,0.85); }
#label{
  font-family:Arial,sans-serif; font-size:0.62rem; letter-spacing:0.2em;
  text-transform:uppercase; color:rgba(255,255,255,0.12);
}
#hint{
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  font-family:Arial,sans-serif; font-size:0.62rem; letter-spacing:0.28em;
  text-transform:uppercase; color:rgba(255,255,255,0.18);
  pointer-events:none; transition:opacity 2s ease;
}

  #panel{
    position:fixed; bottom:2.5rem; left:50%; transform:translateX(-50%);
    z-index:3; display:flex; align-items:center; gap:1.2rem;
    padding:0.7rem 1.2rem;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
    border-radius:100px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.18), inset 0 -1px 0 rgba(0,0,0,0.1), 0 4px 24px rgba(0,0,0,0.4);
    font-family:Arial,sans-serif; font-size:0.58rem; letter-spacing:0.16em;
    text-transform:uppercase; color:rgba(255,255,255,0.45);
  }
  .ctrl{ display:flex; align-items:center; gap:0.5rem; }
  .ctrl label{ white-space:nowrap; }
  .ctrl input[type=range]{
    width:72px; accent-color:rgba(255,255,255,0.7);
    cursor:pointer;
  }
  #panelSep{ width:1px; height:16px; background:rgba(255,255,255,0.12); }
</style>
</head>

    '  float cosA=cos(angle), sinA=sin(angle);',
    '  vec3 dr = vec3(d.x*cosA-d.z*sinA, d.y, d.x*sinA+d.z*cosA);',
    '  float u = atan(dr.z, dr.x)/(2.*PI) + .5;',
    '  float v = acos(clamp(-dr.y,-1.,1.))/PI;',
    '  return texture2D(uHdri, vec2(u,v)).rgb;',
    '}',

    'void main(){',
    '  vec2 asp   = vec2(uRes.x/uRes.y, 1.0);',
    '  vec2 puv   = vUv;',

    /* circular mask — ellipse covering viewport */
    '  vec2 dc    = (vUv - .5) * asp * 2.0;',
    '  float mask = 1.-smoothstep(uScale*0.78,uScale*0.92,length(dc*vec2(1.,1.3)));',
    '  if(mask < 0.01){ gl_FragColor=vec4(0.); return; }',

    /* finite-diff normal from height field */
    '  float eps = 1.0/180.0;',
    '  float hC  = h(puv);',
    '  float hR  = h(puv+vec2(eps,0.));',
    '  float hL  = h(puv-vec2(eps,0.));',
    '  float hU  = h(puv+vec2(0.,eps));',
    '  float hD  = h(puv-vec2(0.,eps));',
    '  float scale = 0.6;',
    '  vec3 norm  = normalize(vec3(-(hR-hL)*scale, 1., -(hU-hD)*scale));',

    /* view ray from slightly above */
    '  vec3 rd    = normalize(vec3(dc.x*.4, -1., dc.y*.4));',

    /* reflection */
    '  vec3 refl  = reflect(rd, norm);',
    '  vec3 ecol  = envMap(normalize(refl));',

    /* fresnel */
    '  float fres = pow(1.-abs(dot(rd,norm)),4.);',
    '  float metal= uMetal + fres*(1.-uMetal);',

    /* speculars */
    '  vec3 L1    = normalize(vec3(.3,1.,.1));',
    '  float sp1  = pow(max(dot(refl,L1),0.),320.)*4.0;',
    '  vec3 L2    = normalize(vec3(-.5,.5,-.4));',
    '  float sp2  = pow(max(dot(refl,L2),0.),90.)*1.0;',
    '  vec3 L3    = normalize(vec3(.1,.4,.9));',
    '  float sp3  = pow(max(dot(refl,L3),0.),140.)*0.7;',

    '  vec3 base  = vec3(0.02,0.02,0.025);',
    '  vec3 col   = mix(base, ecol, metal);',
    '  col += vec3(sp1) + vec3(sp2*.5,sp2*.5,sp2*.6) + vec3(sp3*.3,sp3*.35,sp3*.42);',

    /* ripple glow */
    '  float rg   = max(hC,0.)*2.5;',
    '  col += vec3(rg*.06,rg*.07,rg*.12);',

    /* edge fade */
    '  col *= mask;',

    /* tone map + gamma */
    '  col = col/(1.+col);',
    '  col = pow(max(col,vec3(0.)),vec3(1./2.2));',

    '  gl_FragColor = vec4(col,1.);',
    '}'
  ].join('\n');

  /* ── Compile + link ── */
  function sh(type,src){
    var s=gl.createShader(type);
    gl.shaderSource(s,src); gl.compileShader(s);
    if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){
      console.error(gl.getShaderInfoLog(s)); return null;
    }
    return s;
  }
  var program=gl.createProgram();
  gl.attachShader(program, sh(gl.VERTEX_SHADER,VS));
  gl.attachShader(program, sh(gl.FRAGMENT_SHADER,FS));
  gl.linkProgram(program);
  if(!gl.getProgramParameter(program,gl.LINK_STATUS)){
    console.error(gl.getProgramInfoLog(program)); return;
  }
  gl.useProgram(program);

  /* ── Quad ── */
  var buf=gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
  var aP=gl.getAttribLocation(program,'p');
  gl.enableVertexAttribArray(aP);
  gl.vertexAttribPointer(aP,2,gl.FLOAT,false,0,0);

  /* ── Texture ── */
  /* ── HDRI texture ── */
  var hdriTex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, hdriTex);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.REPEAT);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  /* decode b64 → Uint8Array */
  (function(){
    var b64 = HDRI_B64;
    var blen = b64.length;
    var bytes = new Uint8Array(Math.ceil(blen*0.75));
    var boff=0, chunk=65536;
    for(var i=0;i<blen;i+=chunk){
      var s=atob(b64.slice(i,Math.min(i+chunk,blen)));
      for(var j=0;j<s.length;j++) bytes[boff++]=s.charCodeAt(j);
    }
    gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,512,256,0,gl.RGBA,gl.UNSIGNED_BYTE,bytes.subarray(0,boff));
  })();

  /* ── Wave sim texture ── */
  var tex=gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D,tex);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);

  var uSim   = gl.getUniformLocation(program,'uSim');
  var uHdri  = gl.getUniformLocation(program,'uHdri');
  var uRes   = gl.getUniformLocation(program,'uRes');
  var uTime  = gl.getUniformLocation(program,'uTime');
  var uScale = gl.getUniformLocation(program,'uScale');
  var uMetal   = gl.getUniformLocation(program,'uMetal');
  var uHdriRot = gl.getUniformLocation(program,'uHdriRot');
  gl.uniform1f(uHdriRot, 0.0);
  gl.uniform1i(uSim,0);
  gl.uniform1i(uHdri,1);
  gl.uniform1f(uScale, scaleMult);
  gl.uniform1f(uMetal, metalMult);

  /* ── Mouse ── */
  var mx=0.5, my=0.5, pmx=0.5, pmy=0.5;
  var force=0, targetForce=0;
  var hintGone=false;

  function onMove(cx,cy){
    pmx=mx; pmy=my;
    mx=cx/window.innerWidth;
    my=1-cy/window.innerHeight;
    var spd=Math.hypot(mx-pmx,my-pmy);
    targetForce=Math.min(spd*60,1);
    if(!hintGone){ hintGone=true; hint.style.opacity='0'; }
  }
  window.addEventListener('mousemove',function(e){ onMove(e.clientX,e.clientY); });
  window.addEventListener('touchmove',function(e){
    e.preventDefault(); onMove(e.touches[0].clientX,e.touches[0].clientY);
  },{passive:false});
  window.addEventListener('touchstart',function(e){
    onMove(e.touches[0].clientX,e.touches[0].clientY);
  },{passive:true});
  window.addEventListener('mouseleave',function(){ targetForce=0; });

  /* ── Resize ── */
  function resize(){
    var pr=Math.min(window.devicePixelRatio||1,2);
    canvas.width=window.innerWidth*pr;
    canvas.height=window.innerHeight*pr;
    gl.viewport(0,0,canvas.width,canvas.height);
  }
  resize();
  window.addEventListener('resize',resize);

  /* initial ripple */
  cur[idx(Math.floor(GW/2),Math.floor(GH/2))] = 0.6;
  cur[idx(Math.floor(GW/3),Math.floor(GH/3))] = 0.4;

  /* ── Loop ── */
  var t0=performance.now();
  function frame(){
    var t=(performance.now()-t0)/1000;

    /* smooth mouse */
    force+=(targetForce-force)*0.18;
    targetForce*=0.84;

    /* 2 sim steps per frame for stability */
    simStep(mx,my,force);
    simStep(mx,my,force*0.5);

    /* upload to GPU */
    packTex();
    gl.bindTexture(gl.TEXTURE_2D,tex);
    gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,GW,GH,0,gl.RGBA,gl.UNSIGNED_BYTE,texData);

    /* draw */
    gl.activeTexture(gl.TEXTURE1);
    gl.bindTexture(gl.TEXTURE_2D, hdriTex);
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.uniform2f(uRes,canvas.width,canvas.height);
    gl.uniform1f(uTime,t);
    gl.drawArrays(gl.TRIANGLE_STRIP,0,4);

    requestAnimationFrame(frame);
  }
  frame();

  /* ── Wire controls (after DOM ready) ── */
  window.addEventListener('load', function(){
    function wireCtrl(id, fn){
      var el = document.getElementById(id);
      if(el) el.addEventListener('input', function(){ fn(parseFloat(this.value)); });
    }
    wireCtrl('ctrlSpeed',  function(v){ speedMult  = v; });
    wireCtrl('ctrlRipple', function(v){ rippleMult = v; });
    wireCtrl('ctrlScale',  function(v){
      scaleMult = v;
      gl.useProgram(program);
      gl.uniform1f(uScale, v);
    });
    wireCtrl('ctrlMetal',  function(v){
      metalMult = v;
      gl.useProgram(program);
      gl.uniform1f(uMetal, v);
    });
    wireCtrl('ctrlHdriRot', function(v){
      gl.useProgram(program);
      gl.uniform1f(uHdriRot, v);
    });
  });
})();
</script>

<div id="panel">
  <div class="ctrl"><label>Speed</label><input type="range" id="ctrlSpeed" min="0.1" max="2" step="0.05" value="0.4"></div>
  <div id="panelSep"></div>
  <div class="ctrl"><label>Ripple</label><input type="range" id="ctrlRipple" min="0.05" max="1" step="0.05" value="0.5"></div>
  <div id="panelSep"></div>
  <div class="ctrl"><label>Scale</label><input type="range" id="ctrlScale" min="0.3" max="1.2" step="0.05" value="0.75"></div>
  <div id="panelSep"></div>
  <div class="ctrl"><label>Metal</label><input type="range" id="ctrlMetal" min="0.3" max="1" step="0.05" value="0.88"></div>
  <div id="panelSep"></div>
  <div class="ctrl"><label>Rotate</label><input type="range" id="ctrlHdriRot" min="0" max="1" step="0.01" value="0"></div>
</div>
</body>
</html>
