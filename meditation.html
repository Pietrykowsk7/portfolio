<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Meditation Room — Wojciech Pietryka</title>
<style>
*{ margin:0; padding:0; box-sizing:border-box; }
html,body{ width:100%; height:100%; overflow:hidden; background:#000; }
canvas{ display:block; width:100%; height:100%; }

#ui{
  position:fixed; top:0; left:0; right:0; bottom:0;
  pointer-events:none; z-index:2;
  display:flex; align-items:flex-end; justify-content:space-between;
  padding:2rem 2.5rem;
}
#back{
  font-family:Arial,sans-serif; font-size:0.62rem; letter-spacing:0.2em;
  text-transform:uppercase; color:rgba(255,255,255,0.35);
  text-decoration:none; pointer-events:auto;
  transition:color 0.3s;
}
#back:hover{ color:rgba(255,255,255,0.9); }

#title{
  font-family:Arial,sans-serif; font-size:0.62rem; letter-spacing:0.2em;
  text-transform:uppercase; color:rgba(255,255,255,0.2);
  text-align:right;
}

#hint{
  position:fixed; top:50%; left:50%;
  transform:translate(-50%,-50%);
  font-family:Arial,sans-serif; font-size:0.62rem; letter-spacing:0.25em;
  text-transform:uppercase; color:rgba(255,255,255,0.18);
  pointer-events:none;
  transition:opacity 2s ease;
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="ui">
  <a href="index.html" id="back">← Portfolio</a>
  <div id="title">Meditation Room</div>
</div>
<div id="hint">Move</div>

<script>
(function(){
  var canvas = document.getElementById('c');
  var hint = document.getElementById('hint');
  var gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if(!gl){ document.body.innerHTML='<p style="color:#fff;padding:2rem">WebGL not supported</p>'; return; }

  /* ── Vertex shader ── */
  var VS = [
    'attribute vec2 aPos;',
    'void main(){ gl_Position = vec4(aPos,0.,1.); }'
  ].join('\n');

  /* ── Fragment shader — fluid SDF raymarcher ── */
  var FS = [
    'precision highp float;',
    'uniform vec2  uRes;',
    'uniform float uTime;',
    'uniform vec2  uMouse;   // normalized 0..1',
    'uniform float uHover;   // 0..1 activity',

    /* ── Noise ── */
    'vec3 hash3(vec3 p){',
    '  p = fract(p*vec3(443.8975,397.2973,491.1871));',
    '  p += dot(p.zxy,p.yxz+19.27);',
    '  return fract(p.xxy*p.yxx*p.zyx);',
    '}',
    'float noise(vec3 p){',
    '  vec3 i=floor(p), f=fract(p);',
    '  f=f*f*(3.-2.*f);',
    '  float n=i.x+i.y*157.+113.*i.z;',
    '  return mix(mix(mix(fract(sin(n+0.)*43758.5),fract(sin(n+1.)*43758.5),f.x),',
    '             mix(fract(sin(n+157.)*43758.5),fract(sin(n+158.)*43758.5),f.x),f.y),',
    '             mix(mix(fract(sin(n+113.)*43758.5),fract(sin(n+114.)*43758.5),f.x),',
    '             mix(fract(sin(n+270.)*43758.5),fract(sin(n+271.)*43758.5),f.x),f.y),f.z);',
    '}',
    'float fbm(vec3 p){',
    '  float v=0.,a=.5;',
    '  for(int i=0;i<5;i++){ v+=a*noise(p); p=p*2.+7.1; a*=.5; }',
    '  return v;',
    '}',

    /* ── SDF primitives ── */
    'float sdSphere(vec3 p, float r){ return length(p)-r; }',
    'float sdTorus(vec3 p, vec2 t){',
    '  vec2 q=vec2(length(p.xz)-t.x,p.y);',
    '  return length(q)-t.y;',
    '}',
    'float opSmoothUnion(float d1,float d2,float k){',
    '  float h=clamp(.5+.5*(d2-d1)/k,0.,1.);',
    '  return mix(d2,d1,h)-k*h*(1.-h);',
    '}',

    /* ── Scene SDF ── */
    'float map(vec3 p, float t, vec2 mouse){',
    /* fluid displacement from mouse */
    '  vec2 m = (mouse-.5)*2.;',
    '  float mDist = length(p.xy - m*1.5);',
    '  float mPush = exp(-mDist*mDist*.8) * 0.45 * (1.0 + uHover);',
    '  vec3 pd = p;',
    '  pd.xyz += fbm(p*.6+t*.08)*0.35;',
    '  pd.x += sin(p.y*1.2+t*.4)*0.12+m.x*mPush;',
    '  pd.y += cos(p.x*1.1+t*.35)*0.12+m.y*mPush;',
    '  pd.z += sin(p.x*0.9+p.y*0.8+t*.3)*0.1;',
    /* central liquid blob */
    '  float blob = sdSphere(pd, 0.72);',
    /* orbiting torus — distorted */
    '  vec3 tp = pd;',
    '  float angle = t*.22 + m.x*.5;',
    '  tp.xz = mat2(cos(angle),-sin(angle),sin(angle),cos(angle))*tp.xz;',
    '  tp.xy = mat2(cos(t*.15),-sin(t*.15),sin(t*.15),cos(t*.15))*tp.xy;',
    '  float torus = sdTorus(tp, vec2(1.05,0.28));',
    /* secondary smaller torus */
    '  vec3 tp2 = pd;',
    '  float a2 = -t*.3 + m.y*.4;',
    '  tp2.yz = mat2(cos(a2),-sin(a2),sin(a2),cos(a2))*tp2.yz;',
    '  tp2.xz = mat2(cos(t*.18),-sin(t*.18),sin(t*.18),cos(t*.18))*tp2.xz;',
    '  float torus2 = sdTorus(tp2, vec2(0.65,0.18));',
    /* satellite spheres */
    '  float phi = t*.28; float theta = t*.19;',
    '  vec3 sp = pd - vec3(sin(phi)*1.1, cos(theta)*.7, cos(phi)*1.1);',
    '  float s2 = sdSphere(sp, 0.22);',
    '  float phi2 = t*.21+2.1;',
    '  vec3 sp2 = pd - vec3(cos(phi2)*1.0, sin(t*.24)*.9, sin(phi2)*1.0);',
    '  float s3 = sdSphere(sp2, 0.18);',
    /* combine */
    '  float d = opSmoothUnion(blob, torus, 0.45);',
    '  d = opSmoothUnion(d, torus2, 0.38);',
    '  d = opSmoothUnion(d, s2, 0.32);',
    '  d = opSmoothUnion(d, s3, 0.28);',
    '  return d;',
    '}',

    /* ── Normal ── */
    'vec3 calcNormal(vec3 p, float t, vec2 mouse){',
    '  float e=0.001;',
    '  return normalize(vec3(',
    '    map(p+vec3(e,0,0),t,mouse)-map(p-vec3(e,0,0),t,mouse),',
    '    map(p+vec3(0,e,0),t,mouse)-map(p-vec3(0,e,0),t,mouse),',
    '    map(p+vec3(0,0,e),t,mouse)-map(p-vec3(0,0,e),t,mouse)',
    '  ));',
    '}',

    /* ── Raymarching ── */
    'float march(vec3 ro, vec3 rd, float t, vec2 mouse){',
    '  float d=0.;',
    '  for(int i=0;i<80;i++){',
    '    float h=map(ro+rd*d,t,mouse);',
    '    if(h<0.001) return d;',
    '    if(d>12.) return -1.;',
    '    d+=h*.85;',
    '  }',
    '  return -1.;',
    '}',

    /* ── Environment / chrome reflection ── */
    'vec3 envColor(vec3 dir){',
    '  float y = dir.y;',
    '  vec3 dark = vec3(0.02,0.02,0.025);',
    '  vec3 mid  = vec3(0.08,0.08,0.09);',
    '  vec3 bright = vec3(0.95,0.96,1.0);',
    /* bright band — simulates studio softbox */
    '  float band = smoothstep(.6,.62,dir.y)*smoothstep(.9,.7,dir.y);',
    '  float side = smoothstep(.7,.72,abs(dir.x))*smoothstep(1.,.8,abs(dir.x))*(1.-abs(y)*.8);',
    '  vec3 col = mix(dark, mid, smoothstep(-1.,0.,y));',
    '  col = mix(col, bright, band*.9);',
    '  col = mix(col, bright*.7, side*.5);',
    /* subtle colour tint */
    '  col += vec3(0.,.02,.04)*smoothstep(0.,.5,-y);',
    '  return col;',
    '}',

    /* ── Main ── */
    'void main(){',
    '  vec2 uv = (gl_FragCoord.xy - uRes*.5) / min(uRes.x,uRes.y);',
    '  vec2 mouse = uMouse;',
    '  float t = uTime;',

    /* camera — slow orbit */
    '  float camAngle = t*.04;',
    '  vec3 ro = vec3(sin(camAngle)*3.2, .8+sin(t*.07)*.4, cos(camAngle)*3.2);',
    '  vec3 target = vec3(0.);',
    '  vec3 fwd = normalize(target-ro);',
    '  vec3 right = normalize(cross(vec3(0,1,0),fwd));',
    '  vec3 up = cross(fwd,right);',
    '  vec3 rd = normalize(fwd + uv.x*right*1.2 + uv.y*up*1.2);',

    /* march */
    '  float dist = march(ro, rd, t, mouse);',

    '  vec3 col;',
    '  if(dist > 0.){',
    '    vec3 p = ro + rd*dist;',
    '    vec3 n = calcNormal(p, t, mouse);',

    /* chrome shading */
    '    vec3 refl = reflect(rd, n);',
    '    vec3 env  = envColor(refl);',

    /* fresnel */
    '    float fresnel = pow(1.-clamp(dot(-rd,n),0.,1.),3.);',
    '    float metal = .92 + fresnel*.08;',

    /* two specular highlights */
    '    vec3 L1 = normalize(vec3(.6,.8,.5));',
    '    float spec1 = pow(max(dot(refl,L1),0.),180.)*2.5;',
    '    vec3 L2 = normalize(vec3(-.5,.3,-.7));',
    '    float spec2 = pow(max(dot(refl,L2),0.),60.)*.6;',

    '    col = env*metal + vec3(spec1) + vec3(spec2*.4);',

    /* subtle depth fog */
    '    float fog = 1.-exp(-dist*.04);',
    '    col = mix(col, vec3(0.005,0.005,0.01), fog);',

    /* subtle subsurface colour */
    '    col += vec3(.02,.015,.03)*fbm(p*.8+t*.05)*.6;',

    '  } else {',
    /* background — animated noise */
    '    vec3 bgp = vec3(uv*.5, t*.03);',
    '    float bg = fbm(bgp)*.5+.5;',
    '    col = vec3(bg*.015, bg*.015, bg*.02);',
    /* faint horizon glow */
    '    float glow = exp(-abs(uv.y+.1)*6.)*.04;',
    '    col += vec3(glow*.3, glow*.3, glow*.5);',
    '  }',

    /* tone map + gamma */
    '  col = col/(1.+col);',
    '  col = pow(col, vec3(1./2.2));',

    /* subtle vignette */
    '  float vig = 1.-dot(uv*.6,uv*.6);',
    '  col *= vig;',

    '  gl_FragColor = vec4(col,1.);',
    '}'
  ].join('\n');

  /* ── Compile shaders ── */
  function compile(type, src){
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)){
      console.error(gl.getShaderInfoLog(s));
      return null;
    }
    return s;
  }

  var vs = compile(gl.VERTEX_SHADER, VS);
  var fs = compile(gl.FRAGMENT_SHADER, FS);
  if(!vs || !fs) return;

  var prog = gl.createProgram();
  gl.attachShader(prog, vs); gl.attachShader(prog, fs);
  gl.linkProgram(prog);
  if(!gl.getProgramParameter(prog, gl.LINK_STATUS)){
    console.error(gl.getProgramInfoLog(prog)); return;
  }
  gl.useProgram(prog);

  /* ── Geometry — fullscreen quad ── */
  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'aPos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  /* ── Uniforms ── */
  var uRes   = gl.getUniformLocation(prog, 'uRes');
  var uTime  = gl.getUniformLocation(prog, 'uTime');
  var uMouse = gl.getUniformLocation(prog, 'uMouse');
  var uHover = gl.getUniformLocation(prog, 'uHover');

  /* ── State ── */
  var mouseX = 0.5, mouseY = 0.5;
  var targetX= 0.5, targetY= 0.5;
  var hover  = 0.0, targetHover = 0.0;
  var hintGone = false;

  function resize(){
    canvas.width  = window.innerWidth  * (window.devicePixelRatio||1);
    canvas.height = window.innerHeight * (window.devicePixelRatio||1);
    gl.viewport(0,0,canvas.width,canvas.height);
  }
  resize();
  window.addEventListener('resize', resize);

  function onMove(cx, cy){
    targetX = cx / window.innerWidth;
    targetY = 1 - cy / window.innerHeight;
    targetHover = 1.0;
    if(!hintGone){ hintGone=true; hint.style.opacity='0'; }
  }
  window.addEventListener('mousemove', function(e){ onMove(e.clientX, e.clientY); });
  window.addEventListener('touchmove', function(e){
    e.preventDefault();
    onMove(e.touches[0].clientX, e.touches[0].clientY);
  }, {passive:false});
  window.addEventListener('mouseleave', function(){ targetHover=0.; });

  /* ── Render loop ── */
  var start = performance.now();
  function render(){
    var t = (performance.now()-start)/1000;

    /* smooth mouse */
    mouseX += (targetX-mouseX)*0.06;
    mouseY += (targetY-mouseY)*0.06;
    hover  += (targetHover-hover)*0.04;
    targetHover *= 0.985;

    gl.uniform2f(uRes,   canvas.width, canvas.height);
    gl.uniform1f(uTime,  t);
    gl.uniform2f(uMouse, mouseX, mouseY);
    gl.uniform1f(uHover, hover);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
  }
  render();

})();
</script>
</body>
</html>
